<script>
  /* =========================
     CONFIGURACIÓN GENERAL DEL FRONTEND
     Aquí se define la ruta de la API bajo tu mismo dominio
     ========================= */
  const API_BASE = "/api";

  /* =========================
     ESTADO GLOBAL DEL FRONTEND
     Aquí se guardan imágenes y config cargada desde backend
     ========================= */
  let webappConfig = {
    version: "",
    email: "",
    facebook: "",
    instagram: "",
    linkedin: "",
    whatsapp: "",
    logoPrincipal: "",
    logoFooter: "",
    leftImages: [],
    rightImages: []
  };

  let leftIndex = 0;
  let rightIndex = 0;

  /* =========================
     CONTROLES DE INPUT
     Mostrar / ocultar la clave
     ========================= */
  function toggleView() {
    const p = document.getElementById("pass-in");
    p.type = p.type === "password" ? "text" : "password";
  }

  /* =========================
     UTILIDAD DE NÚMEROS
     Limpia texto numérico antes de consultar
     ========================= */
  function toNumber(v) {
    if (v === null || v === undefined || v === "") return 0;
    if (typeof v === "number") return v;

    let s = String(v).trim();
    s = s.replace(/[^\d.,-]/g, "");

    if (s.includes(",") && s.includes(".")) {
      s = s.replace(/\./g, "").replace(",", ".");
    } else {
      s = s.replace(/\./g, "");
      s = s.replace(",", ".");
    }

    const n = Number(s);
    return isNaN(n) ? 0 : n;
  }

  /* =========================
     ESTADO VISUAL DE CARGA
     Controla botón, loader y resultados
     ========================= */
  function setLoadingState(isLoading) {
    const btn = document.getElementById("btn-send");
    const load = document.getElementById("loader-box");
    const res = document.getElementById("res-display");

    if (isLoading) {
      btn.disabled = true;
      btn.textContent = "Consultando...";
      load.style.display = "block";
      res.style.display = "none";
    } else {
      btn.disabled = false;
      btn.textContent = "Consultar Saldo";
      load.style.display = "none";
    }
  }

  /* =========================
     MENSAJES DE ERROR
     Muestra errores al usuario
     ========================= */
  function mostrarError(mensaje) {
    const res = document.getElementById("res-display");
    res.style.display = "block";
    res.innerHTML = `
      <div class="box" style="border-color: red; text-align:center;">
        <b>${mensaje}</b><br>
        Por favor intente nuevamente.
      </div>
    `;
  }

  /* =========================
     PRECARGA DE IMÁGENES
     Sirve para cargar logos y primeros banners antes de mostrarlos
     ========================= */
  function precargarImagen(url) {
    return new Promise((resolve, reject) => {
      if (!url) {
        resolve();
        return;
      }

      const img = new Image();
      img.onload = () => resolve(url);
      img.onerror = () => reject(new Error(`No se pudo cargar la imagen: ${url}`));
      img.src = url;
    });
  }

  async function precargarRecursosPrincipales(config) {
    const urlsAprecargar = [
      config.logoPrincipal,
      config.logoFooter,
      config.leftImages?.[0],
      config.rightImages?.[0]
    ].filter(Boolean);

    const resultados = await Promise.allSettled(
      urlsAprecargar.map(url => precargarImagen(url))
    );

    resultados.forEach((resultado, i) => {
      if (resultado.status === "rejected") {
        console.warn("Falló precarga:", urlsAprecargar[i]);
      }
    });
  }

  /* =========================
     CARGA DE CONFIGURACIÓN
     Obtiene logos, redes, banners, WhatsApp, email y versión
     ========================= */
  async function cargarConfig() {
    try {
      const response = await fetch(`${API_BASE}?action=config&t=${Date.now()}`, {
        method: "GET",
        cache: "no-store"
      });

      const rawText = await response.text();
      console.log("Respuesta cruda /api?action=config:", rawText);

      let result;
      try {
        result = JSON.parse(rawText);
      } catch (parseError) {
        console.error("No se pudo parsear JSON:", parseError);
        alert("La API no devolvió JSON válido. Revisa la consola.");
        return;
      }

      console.log("JSON parseado:", result);

      if (!result.ok || !result.data) {
        console.error("La API respondió con error:", result);
        alert("La API respondió con error: " + (result.message || "sin mensaje"));
        return;
      }

      webappConfig = result.data;

      await precargarRecursosPrincipales(webappConfig);

      aplicarConfigEnPantalla();
      iniciarRotacionBanners();

    } catch (error) {
      console.error("Error cargando configuración:", error);
      alert("Error cargando configuración. Revisa la consola.");
    }
  }

  /* =========================
     APLICAR CONFIG EN PANTALLA
     Inserta logos, links y versión en el HTML
     ========================= */
  function aplicarConfigEnPantalla() {
    const logoPrincipal = document.getElementById("logo-principal");
    const logoFooter = document.getElementById("logo-footer");
    const supportMail = document.getElementById("support-mail");
    const supportLink = document.getElementById("support-link");
    const linkFacebook = document.getElementById("link-facebook");
    const linkInstagram = document.getElementById("link-instagram");
    const linkLinkedin = document.getElementById("link-linkedin");
    const linkWhatsapp = document.getElementById("link-whatsapp");
    const versionWebapp = document.getElementById("version-webapp");

    if (logoPrincipal && webappConfig.logoPrincipal) {
      logoPrincipal.src = webappConfig.logoPrincipal;
    }

    if (logoFooter && webappConfig.logoFooter) {
      logoFooter.src = webappConfig.logoFooter;
    }

    if (supportMail) {
      supportMail.textContent = webappConfig.email || "";
    }

    if (supportLink) {
      supportLink.href = webappConfig.email
        ? `mailto:${webappConfig.email}?subject=Consulta%20Colbipuntos`
        : "#";
    }

    if (linkFacebook) linkFacebook.href = webappConfig.facebook || "#";
    if (linkInstagram) linkInstagram.href = webappConfig.instagram || "#";
    if (linkLinkedin) linkLinkedin.href = webappConfig.linkedin || "#";
    if (linkWhatsapp) linkWhatsapp.href = webappConfig.whatsapp || "#";

    if (versionWebapp) {
      versionWebapp.textContent = webappConfig.version
        ? `Versión ${webappConfig.version}`
        : "";
    }
  }

  /* =========================
     CONSULTA PRINCIPAL
     Envía NIT y clave al backend
     ========================= */
  async function ejecutar() {
    const nit = toNumber(document.getElementById("nit-in").value.trim());
    const pass = document.getElementById("pass-in").value.trim();

    if (!nit || !pass) {
      alert("Por favor, ingrese NIT y Clave");
      return;
    }

    setLoadingState(true);

    try {
      const response = await fetch(API_BASE, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: "buscarCliente",
          nit: String(nit),
          codigo: pass
        })
      });

      const rawText = await response.text();
      console.log("Respuesta cruda consulta:", rawText);

      let result;
      try {
        result = JSON.parse(rawText);
      } catch (parseError) {
        console.error("No se pudo parsear JSON de consulta:", parseError);
        setLoadingState(false);
        mostrarError("La API devolvió una respuesta inválida.");
        return;
      }

      setLoadingState(false);

      const res = document.getElementById("res-display");
      res.style.display = "block";

      if (!result.ok || !result.data) {
        mostrarError(result.message || "Datos incorrectos.");
        return;
      }

      const data = result.data;

      const moneda = new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: "COP",
        maximumFractionDigits: 0
      });

      res.innerHTML = `
        <div class="box">
          <span class="label">Cliente</span>
          <span class="val">${data.razon}</span>
        </div>
        <div class="box">
          <span class="label">Rango</span>
          <span class="val">${data.rango}</span>
        </div>
        <div class="box" style="background: #250a0a;">
          <span class="label">Saldo Disponible</span>
          <span class="val big-val">${moneda.format(data.saldo)}</span>
        </div>
      `;

    } catch (error) {
      console.error("Error consultando cliente:", error);
      setLoadingState(false);
      mostrarError("Error de conexión con el servidor.");
    }
  }

  /* =========================
     ROBAPÁGINAS
     Controla la rotación de banners laterales
     ========================= */
  function mostrarBanner(imgElementId, imageArray, index) {
    const img = document.getElementById(imgElementId);
    if (!img || !imageArray.length) return;

    img.classList.remove("visible");

    const siguienteUrl = imageArray[index];
    const precarga = new Image();

    precarga.onload = () => {
      img.src = siguienteUrl;
      img.classList.add("visible");
    };

    precarga.onerror = () => {
      console.warn("No se pudo cargar banner:", siguienteUrl);
    };

    precarga.src = siguienteUrl;
  }

  function iniciarRotacionBanners() {
    if (window.innerWidth <= 1200) return;
    if (!webappConfig.leftImages.length && !webappConfig.rightImages.length) return;

    if (webappConfig.leftImages.length) {
      mostrarBanner("left-banner", webappConfig.leftImages, leftIndex);

      setInterval(() => {
        leftIndex = (leftIndex + 1) % webappConfig.leftImages.length;
        mostrarBanner("left-banner", webappConfig.leftImages, leftIndex);
      }, 6000);
    }

    if (webappConfig.rightImages.length) {
      mostrarBanner("right-banner", webappConfig.rightImages, rightIndex);

      setInterval(() => {
        rightIndex = (rightIndex + 1) % webappConfig.rightImages.length;
        mostrarBanner("right-banner", webappConfig.rightImages, rightIndex);
      }, 6000);
    }
  }

  /* =========================
     EVENTOS DE TECLADO Y ARRANQUE
     Carga config al abrir y permite consultar con Enter
     ========================= */
  document.addEventListener("DOMContentLoaded", function () {
    const nitInput = document.getElementById("nit-in");
    const passInput = document.getElementById("pass-in");

    function manejarEnter(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        ejecutar();
      }
    }

    nitInput.addEventListener("keydown", manejarEnter);
    passInput.addEventListener("keydown", manejarEnter);

    cargarConfig();
  });
</script>
